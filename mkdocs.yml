site_name: 장금상선 그룹 챗봇 · 기술 가이드
site_description: 사내 그룹 챗봇 의 사용·기술 문서 (공개판)
site_url: https://ysh21368ai.github.io/chatbot-docs/

repo_name: chatbot-docs
repo_url: https://github.com/ysh21368ai/chatbot-docs

docs_dir: docs

# 사내 전용 문서는 본 공개 리포에 푸시하지 않습니다 (sync 스크립트가 제외).

nav:
  - 홈: index.md
  - 사용 매뉴얼: user_manual.md

  - 시스템:
      - 아키텍처 개요: architecture.md
      - 아키텍처 결정 기록 (ADR): architecture-decisions.md
      - 모듈 맵: modules.md
      - 서비스 카탈로그: services.md
      - 확장성·성능: scaling.md
      - 성능 프로파일링: perf.md

  - 데이터:
      - ERD · 스키마: erd.md
      - 문서 RAG: document_rag.md
      - RAG 개선 노트: rag-improvements.md

  - 기능:
      - 챗봇: chatbot.md
      - 챗봇 공유: chatbot_sharing.md
      - 스킬 마켓플레이스: skills-marketplace.md
      - 도구: tools.md
      - 코드 인터프리터 샌드박스: sandbox.md
      - 클로드 코드 모드: claude-code-mode.md
      - Claude Code CLI 옵션 매핑: claude-code-cli.md
      - 브랜드 테마: themes.md

  - API: api.md

  - 프론트엔드:
      - 프론트엔드 아키텍처: frontend.md
      - 디자인 철학: design-philosophy.md
      - 디자인 시스템: design-system.md
      - UX 원칙: ux-principles.md
      - IA 가드 (메뉴 추가 룰): ia-rules.md
      - 디자인 토큰 & 변화 내성 룰: design-tokens.md
      - CTO 감사 보고서: audit-cto.md
      - 전체 감사 보고서: full-audit.md

  - 권한:
      - RBAC: rbac.md

  - 코드 워크스루:
      - 시작하기: code-walkthrough/index.md
      - 큰 그림:
          - main · 부팅 흐름: code-walkthrough/backend-main.md
          - DB 모델 지도: code-walkthrough/backend-models.md
          - 공통 의존성: code-walkthrough/backend-deps.md
      - 백엔드 도메인:
          - auth — 로그인/가입/승인: code-walkthrough/backend-auth.md
          - chat — SSE + agent: code-walkthrough/backend-chat.md
          - documents — RAG 인제스트: code-walkthrough/backend-documents.md
          - workflows — 엔진 + NL 생성: code-walkthrough/backend-workflows.md
          - faqs — FAQ + AI 답글: code-walkthrough/backend-faqs.md
          - 나머지 모듈 묶음: code-walkthrough/backend-misc.md
      - 프론트엔드:
          - 부팅 + AppShell: code-walkthrough/frontend-shell.md
          - API 클라이언트: code-walkthrough/frontend-api.md
          - 채팅 화면 (SSE 수신): code-walkthrough/frontend-chat.md
          - 워크플로 캔버스 (2D · 3D): code-walkthrough/frontend-workflow-canvas.md
          - 테마 시스템: code-walkthrough/frontend-theme.md
          - 디자인 시스템 (Stitch): code-walkthrough/frontend-design.md

  - ADR (아키텍처 결정 기록):
      - ADR-0007 · Claude Code 모드 분리·작업공간 영속: adr/0007-claude-code-mode-separation-and-workspace-persistence.md
      - ADR-0006 · Progressive AI Workspace: adr/0006-progressive-ai-workspace.md
      - ADR-0005 · Claude Code as Coding Agent: adr/0005-claude-code-as-coding-agent.md
      - ADR-0004 · Self-Modifying Chatbot Tools: adr/0004-self-modifying-chatbot-tools.md
      - ADR-0003 · Embedded IDE Workspace (Deferred · Builder Mode 로 흡수): adr/0003-embedded-ide-workspace.md
      - ADR-0002 · User-Scoped AI Execution Platform: adr/0002-user-scoped-ai-execution-platform.md
      - ADR-0001 · Sandbox Runtime & Lifecycle: adr/0001-sandbox-runtime.md

  - 변경 이력: changelog.md

theme:
  name: material
  language: ko
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: green
      toggle:
        icon: material/weather-night
        name: 다크 모드로
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: green
      toggle:
        icon: material/weather-sunny
        name: 라이트 모드로
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tabs.link
  font:
    text: Pretendard
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: ¶
      toc_depth: 3
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social:
    - icon: fontawesome/solid/envelope
      link: mailto:ysh21368@sinokor.co.kr
      name: 문의 (AI 파트)

copyright: 장금상선 AI 파트
